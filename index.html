<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ParkPulse</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ParkPulse">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Theme -->
  <meta name="theme-color" content="#ff8c00">
  <meta name="msapplication-TileColor" content="#0a0a0f">

  <!-- SEO / Open Graph -->
  <meta name="description" content="Trova posti auto liberi in tempo reale a Bologna, Torino e Firenze. Dati aggiornati ogni 15 minuti da fonti ufficiali. Gratuito.">
  <meta property="og:title" content="ParkPulse">
  <meta property="og:description" content="Disponibilità parcheggi in tempo reale nelle principali città italiane">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://parkpulse.it/">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
    }

    /* Splash screen mostrato mentre l'iframe carica */
    #splash {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-icon {
      width: 72px; height: 72px;
      background: #ff8c0015;
      border: 1px solid #ff8c0040;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .splash-title {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #e8e6e0;
      letter-spacing: 0.1em;
    }
    .splash-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #1e1e2e;
      border-top-color: #ff8c00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Iframe a tutto schermo */
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0a0f;
    }

    /* Banner "installa app" — mostrato solo su mobile se non già installata */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0f0f18;
      border-top: 1px solid #1e1e2e;
      padding: 12px 16px;
      z-index: 200;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #install-banner.visible { display: flex; }
    .banner-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: #aaa;
      line-height: 1.5;
    }
    .banner-text b { color: #e8e6e0; }
    .btn-install {
      flex-shrink: 0;
      background: #ff8c00;
      color: #0a0a0f;
      border: none;
      border-radius: 3px;
      padding: 8px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-dismiss {
      background: transparent;
      border: none;
      color: #444;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
    }
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-H5D1JNW6R1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-H5D1JNW6R1');
</script>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div class="splash-icon">🅿</div>
    <div class="splash-title">ParkPulse</div>
    <div class="splash-sub">Real-time Parking Italy</div>
    <div class="spinner"></div>
  </div>

  <!-- App Streamlit in iframe -->
  <iframe
    id="app-frame"
    src="https://parcheggi-automazione.streamlit.app/?embed=true"
    allow="geolocation"
    loading="eager"
    title="ParkPulse"
  ></iframe>

  <!-- Banner installa PWA (Android/Chrome) -->
  <div id="install-banner">
    <div class="banner-text">
      <b>Installa l'app</b><br>
      Aggiungi alla schermata home per accesso rapido
    </div>
    <button class="btn-install" id="btn-install">Installa</button>
    <button class="btn-dismiss" id="btn-dismiss">✕</button>
  </div>

  <script>
    // ── Nascondi splash quando iframe è pronto ──
    const frame  = document.getElementById("app-frame");
    const splash = document.getElementById("splash");

    // Timeout di sicurezza: dopo 6s nascondi comunque lo splash
    const fallback = setTimeout(() => splash.classList.add("hidden"), 6000);

    frame.addEventListener("load", () => {
      clearTimeout(fallback);
      setTimeout(() => splash.classList.add("hidden"), 600);
    });

    // ── Service Worker ──
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sw.js")
          .then(reg => console.log("SW registrato:", reg.scope))
          .catch(err => console.warn("SW fallito:", err));
      });
    }

    // ── Banner installa (A2HS — solo Chrome/Android) ──
    let deferredPrompt = null;
    const banner     = document.getElementById("install-banner");
    const btnInstall = document.getElementById("btn-install");
    const btnDismiss = document.getElementById("btn-dismiss");

    // Non mostrare se già installata o già rifiutata
    const dismissed = localStorage.getItem("pwa-dismissed");

    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      if (!dismissed) banner.classList.add("visible");
    });

    btnInstall.addEventListener("click", async () => {
      banner.classList.remove("visible");
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log("PWA install:", outcome);
        deferredPrompt = null;
      }
    });

    btnDismiss.addEventListener("click", () => {
      banner.classList.remove("visible");
      localStorage.setItem("pwa-dismissed", "1");
    });

    // Su iOS mostra istruzione manuale (niente beforeinstallprompt)
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches;
    if (isIOS && !isStandalone && !dismissed) {
      banner.innerHTML = `
        <div class="banner-text">
          <b>Installa su iPhone</b><br>
          Tocca <b>Condividi</b> → <b>Aggiungi a schermata Home</b>
        </div>
        <button class="btn-dismiss" id="btn-dismiss-ios">✕</button>
      `;
      banner.classList.add("visible");
      document.getElementById("btn-dismiss-ios").addEventListener("click", () => {
        banner.classList.remove("visible");
        localStorage.setItem("pwa-dismissed", "1");
      });
    }
  </script>

</body>
</html>
