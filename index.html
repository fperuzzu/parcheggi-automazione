<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dashboard Parcheggi Storico</title>
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
        <style>
            body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
            .container { display: flex; flex-wrap: wrap; justify-content: center; }
            .card { background: white; border-radius: 15px; margin: 15px; padding: 20px; width: 450px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .city-tag { background: #007bff; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; }
            .charts-grid { display: block; }
        </style></head><body>
        <h1>📊 Monitoraggio Parcheggi (Real-time + Storico 24h)</h1>
        <div class="container">
            <div class="card">
                <span class="city-tag">Bologna</span>
                <h2>Autostazione</h2>
                <div id="g_-1116214881630252982"></div>
                <div id="l_-1116214881630252982"></div>
                <p>Posti attuali liberi: <strong>136</strong> / Totali: 257</p>
            </div>
            <script>
                // Grafico Tachimetro
                Plotly.newPlot("g_-1116214881630252982", [{
                    type: "indicator", mode: "gauge+number", value: 47.1,
                    number: { suffix: "%" },
                    gauge: { axis: { range: [0, 100] }, bar: { color: "#2ecc71" } }
                }], { width: 400, height: 200, margin: { t: 0, b: 0 } });

                // Grafico Storico
                Plotly.newPlot("l_-1116214881630252982", [{
                    x: ['13:54', '14:40', '14:49', '15:25', '15:46', '16:31'], y: [85, 99, 99, 100, 111, 136], type: 'scatter', mode: 'lines+markers',
                    name: 'Posti Liberi', line: { color: '#007bff' }
                }], { 
                    title: 'Andamento Posti Liberi (24h)',
                    xaxis: { title: 'Ora' },
                    yaxis: { title: 'Liberi' },
                    width: 400, height: 200, margin: { t: 30, b: 40, l: 40, r: 20 }
                });
            </script>
