name: Auto Update Parcheggi

on:
  schedule:
    - cron: '*/15 * * * *'   # ogni 15 minuti (GitHub può saltarne qualcuno di notte)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          TURSO_URL:   ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: |
          DAY=$(date +%u)
          HOUR=$(date +%H)
          if [ "$DAY" = "7" ] && [ "$HOUR" = "02" ]; then
            python motore_db.py --pulisci --retention 30
          else
            python motore_db.py
          fi

      - name: Aggiorna sitemap lastmod
        run: |
          python3 - <<'PYEOF'
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S+00:00")
          urls = ["https://parkpulse.it/", "https://parkpulse.it/bologna", "https://parkpulse.it/torino", "https://parkpulse.it/firenze"]
          prio = ["1.0", "0.9", "0.9", "0.9"]
          xml = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          for u, p in zip(urls, prio):
              xml += f'  <url><loc>{u}</loc><lastmod>{now}</lastmod><changefreq>always</changefreq><priority>{p}</priority></url>\n'
          xml += '</urlset>'
          open("sitemap.xml", "w").write(xml)
          print("Sitemap aggiornata:", now)
          PYEOF

      - name: Commit sitemap aggiornata
        run: |
          git config user.name "ParkPulse Bot"
          git config user.email "bot@parkpulse.it"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: aggiorna sitemap lastmod"
          git push
