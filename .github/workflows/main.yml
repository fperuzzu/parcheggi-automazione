name: Auto Update Parcheggi

on:
  schedule:
    - cron: '0,30 * * * *'   # ogni 30 minuti
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          TURSO_URL:   ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: |
          DAY=$(date +%u)
          HOUR=$(date +%H)
          if [ "$DAY" = "7" ] && [ "$HOUR" = "02" ]; then
            python motore_db.py --pulisci --retention 30
          else
            python motore_db.py
          fi

      # Nessun commit — il DB vive su Turso, non nel repo
